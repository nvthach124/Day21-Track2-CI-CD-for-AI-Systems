name: MLOps Pipeline

on:
  push:
    branches: [master]
    paths:
      - 'data/**.dvc'
      - 'src/**.py'
      - 'params.yaml'
  workflow_dispatch:

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: pip install -r requirements.txt
      - name: Run tests
        run: pytest tests/ -v

  train:
    name: Train
    needs: test
    runs-on: ubuntu-latest
    outputs:
      accuracy: ${{ steps.read_metrics.outputs.accuracy }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.10"
      - name: Install dependencies
        run: |
          pip install -r requirements.txt
          pip install dvc-s3 boto3 dagshub

      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Pull data with DVC
        run: dvc pull

      - name: Train model
        env:
          MLFLOW_TRACKING_URI: ${{ secrets.MLFLOW_TRACKING_URI }}
          MLFLOW_TRACKING_USERNAME: ${{ secrets.MLFLOW_TRACKING_USERNAME }}
          MLFLOW_TRACKING_PASSWORD: ${{ secrets.MLFLOW_TRACKING_PASSWORD }}
        run: python src/train.py

      - name: Read metrics
        id: read_metrics
        run: |
          ACC=$(python -c "import json; print(json.load(open('outputs/metrics.json'))['accuracy'])")
          echo "accuracy=$ACC" >> $GITHUB_OUTPUT

      - name: Upload artifacts to S3
        run: |
          aws s3 cp models/model.pkl s3://${{ secrets.CLOUD_BUCKET }}/models/latest/model.pkl
          aws s3 cp outputs/metrics.json s3://${{ secrets.CLOUD_BUCKET }}/models/latest/metrics.json

      - name: Save artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ml_outputs
          path: |
            outputs/metrics.json
            outputs/report.txt

  eval:
    name: Eval
    needs: train
    runs-on: ubuntu-latest
    steps:
      - name: Authenticate to AWS
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
          aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          aws-region: us-east-1

      - name: Check rollback and threshold
        run: |
          python - <<EOF
          import json
          import os
          import sys
          import subprocess

          current_acc = float("${{ needs.train.outputs.accuracy }}")
          print(f"Current Accuracy: {current_acc:.4f}")

          # Check basic threshold
          if current_acc < 0.70:
              print("❌ FAILED: Accuracy below threshold 0.70.")
              sys.exit(1)

          # --- Bonus 4: Hoàn trả về phiên bản trước ---
          try:
              print("Checking for previous metrics on S3...")
              subprocess.run(["aws", "s3", "cp", "s3://${{ secrets.CLOUD_BUCKET }}/models/latest/metrics.json", "prev_metrics.json"], check=True)
              with open("prev_metrics.json") as f:
                  prev_acc = json.load(f)["accuracy"]
              print(f"Previous Accuracy: {prev_acc:.4f}")
              
              if current_acc < prev_acc:
                  print(f"❌ ROLLBACK: New accuracy ({current_acc:.4f}) is lower than current production accuracy ({prev_acc:.4f}).")
                  sys.exit(1)
              else:
                  print("✅ SUCCESS: New model is better or equal to production model.")
          except Exception as e:
              print(f"No previous metrics found or error occurred: {e}. Proceeding as first deployment.")

          EOF

  deploy:
    name: Deploy
    needs: eval
    runs-on: ubuntu-latest
    steps:
      - uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.VM_HOST }}
          username: ${{ secrets.VM_USER }}
          key: ${{ secrets.VM_SSH_KEY }}
          script: |
            sudo systemctl restart mlops-serve
            sleep 5
            curl -f http://localhost:8000/health || exit 1
